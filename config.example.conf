# 周报生成器配置文件
# 使用前请复制为 config.conf：cp config.example.conf config.conf

# 项目目录列表，每行一个绝对路径（非程序员可留空，仅使用手动输入）
PROJECT_DIRS=(
    "/path/to/your/project-a"
    "/path/to/your/project-b"
)

# 可选：指定 git author（留空则自动从各项目的 git config user.name 读取）
AUTHOR=""

# 时间范围（默认 week）
# 可选值：week（本周）、biweek（近两周）、month（本月）、自定义如 2026-03-01,2026-03-21
DATE_RANGE="week"

# 输出模板（默认 dev）
# 可选值：dev（开发周报）、manager（管理者周报）、project（项目周报）
OUTPUT_TEMPLATE="dev"
